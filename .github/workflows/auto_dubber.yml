name: Auto Dubber

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "Link to the source video (TikTok, RedNote, YouTube, etc.)"
        required: true
      target_lang:
        description: "Target language code (en, hi, es, fr, de, zh, ja, ar, pt, ru)"
        required: true
        default: "en"

jobs:
  dub-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run dubber
        env:
          VIDEO_URL: ${{ inputs.video_url }}
          TARGET_LANG: ${{ inputs.target_lang }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: python scripts/dub.py

      - name: Upload dubbed video as artifact (backup / preview)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dubbed-video
          path: work/dubbed_output.mp4
          if-no-files-found: ignore
